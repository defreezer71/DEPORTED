name: Deploy game client to GitHub Pages

# Replaces the implicit "deploy from a branch" builder, which silently stopped
# rebuilding on push (left the live site 3 commits stale). This builds
# js/game.js from js/src via build.sh so the published bundle can never drift
# from source, then deploys the repo root (index.html + js/) to Pages.

on:
  push:
    branches: [main]
  workflow_dispatch:

# One Pages deploy at a time; never cancel an in-flight publish.
concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build client bundle (js/game.js from js/src)
        run: bash build.sh

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload site (repo root — served as-is today)
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
